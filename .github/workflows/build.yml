name: Build and verify
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # 6.0.1
        with:
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # 5.1.0
        with:
          distribution: 'temurin'
          java-version: 25
          check-latest: true
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # 5.0.0
      - name: Build, test, remap, and validate
        run: ./gradlew --no-daemon test :viafabric-mc189:build :viafabric-mc189:validateProductionJar
      - name: Startup smoke test
        run: bash .github/scripts/smoke-test.sh
      - name: Upload jars and diagnostic logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # 6.0.0
        with:
          name: viafabric-mc189-${{ github.sha }}
          if-no-files-found: warn
          path: |
            build/libs/*.jar
            viafabric-mc189/build/libs/*.jar
            build/smoke/server.log
            logs/latest.log
            build/reports/**
            viafabric-mc189/build/reports/**
